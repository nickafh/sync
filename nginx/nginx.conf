events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name sync.atlantafinehomes.com;

        # Let's Encrypt challenge path
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name sync.atlantafinehomes.com;

        ssl_certificate /etc/letsencrypt/live/sync.atlantafinehomes.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/sync.atlantafinehomes.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # HSTS - tell browsers to always use HTTPS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        client_max_body_size 10M;
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;

        # Health check passthrough
        location /health {
            set $api_upstream api:8080;
            proxy_pass http://$api_upstream;
        }

        # API routes
        location /api/ {
            set $api_upstream api:8080;
            proxy_pass http://$api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Frontend (Next.js)
        location / {
            set $frontend_upstream frontend:3000;
            proxy_pass http://$frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
